<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>FishBuddy — Найди компанию на рыбалку</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    margin: 0;
}
header {
    background: #1e293b;
    padding: 20px;
    text-align: center;
}
button {
    background: #22c55e;
    border: none;
    padding: 10px 15px;
    color: black;
    cursor: pointer;
    margin-top: 10px;
}
.container {
    padding: 20px;
}
.post {
    background: #1e293b;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
}
input, textarea {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<header>
    <h1>🎣 FishBuddy</h1>
    <p>Найди компанию для рыбалки рядом</p>
    <button onclick="showForm()">Создать объявление</button>
</header>

<div class="container">

<div id="form" style="display:none;">
    <h3>Новое объявление</h3>
    <input id="name" placeholder="Имя">
    <input id="city" placeholder="Город">
    <textarea id="text" placeholder="Куда едешь, когда, есть ли лодка/машина"></textarea>
    <button onclick="addPost()">Опубликовать</button>
</div>

<h2>Лента объявлений</h2>
<div id="posts"></div>

</div>

<script>
let posts = JSON.parse(localStorage.getItem("posts")) || [];

function render() {
    let container = document.getElementById("posts");
    container.innerHTML = "";
    posts.reverse().forEach(p => {
        container.innerHTML += `
        <div class="post">
            <strong>${p.name}</strong> (${p.city})<br>
            ${p.text}
        </div>`;
    });
    posts.reverse();
}

function addPost() {
    let post = {
        name: document.getElementById("name").value,
        city: document.getElementById("city").value,
        text: document.getElementById("text").value
    };

    posts.push(post);
    localStorage.setItem("posts", JSON.stringify(posts));
    render();

    document.getElementById("form").style.display = "none";
}

function showForm() {
    document.getElementById("form").style.display = "block";
}

render();
</script>

</body>
</html>
